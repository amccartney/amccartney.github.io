name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - run: corepack enable && corepack prepare pnpm@10.0.0 --activate
      - run: pnpm install
      - run: pnpm build
      - uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
      - name: Determine deployment URL
        run: |
          if [[ "${GITHUB_REPOSITORY##*/}" == "${GITHUB_REPOSITORY_OWNER}.github.io" ]]; then
            echo "DEPLOYMENT_URL=https://${GITHUB_REPOSITORY_OWNER}.github.io" >> $GITHUB_ENV
          else
            echo "DEPLOYMENT_URL=https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY##*/}" >> $GITHUB_ENV
          fi
      - name: Log deployment URLs
        run: |
          echo "GitHub Pages deployment URL: $DEPLOYMENT_URL"
          echo "GitHub Actions run URL: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          echo "Commit SHA: $GITHUB_SHA"
      - name: Comment deployment URL on commit
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const deploymentUrl = process.env.DEPLOYMENT_URL;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `Deployment complete ✅\n\nGitHub Pages: ${deploymentUrl}\nActions run: ${runUrl}`
            });
